name: Generate local flags
on:
  workflow_dispatch:
  push:
    paths:
      - assets/data/emergency.json

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # indispensable pour committer
    steps:
      - uses: actions/checkout@v4

      - name: Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Ensure folders
        run: |
          SIZE=24x18
          mkdir -p assets/img/flags/$SIZE

      - name: Ensure emergency.json (fallback if missing)
        run: |
          if [ ! -f assets/data/emergency.json ]; then
            cat > assets/data/emergency.json <<'JSON'
            {"default":{"general":"112"},"CM":{"country":"Cameroon"},"FR":{"country":"France"},"US":{"country":"United States"},"CA":{"country":"Canada"}}
            JSON
          fi

      - name: Build country list
        run: |
          jq -r 'keys[] | select(. != "default")' assets/data/emergency.json \
            | tr '[:upper:]' '[:lower:]' | sort -u > codes.txt
          echo "Countries: $(wc -l < codes.txt)"

      - name: Download flags locally
        run: |
          set -e
          SIZE=24x18
          while read code; do
            [ -z "$code" ] && continue
            out="assets/img/flags/$SIZE/$code.png"
            [ -f "$out" ] && continue
            url="https://flagcdn.com/$SIZE/$code.png"
            echo "↓ $url"
            curl -fsSL "$url" -o "$out" || echo "MISS $code"
          done < codes.txt

      - name: Switch country-flags.js to local
        run: |
          SIZE=24x18
          sed -i "s|https://flagcdn.com/[0-9]\+x[0-9]\+/\${code.toLowerCase()}.png|assets/img/flags/$SIZE/\${code.toLowerCase()}.png|g" assets/js/country-flags.js || true
          grep -q 'assets/img/flags' assets/js/country-flags.js || cat >> assets/js/country-flags.js <<'EOF'
          function flagURL(code){ code=(code||'').toLowerCase(); return `assets/img/flags/24x18/${code}.png`; }
          EOF

      - name: Bump SW cache (force refresh)
        run: |
          ts=$(date +%s)
          sed -i "s/const CACHE='[^']*'/const CACHE='sos-monde-${ts}'/g" sw.js || true

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(flags): local flags + SW bump"
