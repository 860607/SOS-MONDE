<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SOS.Monde – Aide d’urgence</title>
  <meta name="description" content="PWA d’urgence multilingue pour contacter rapidement les secours et partager des infos essentielles." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#ffffff">
  <link rel="icon" href="icons/icon-192.png">

  <!-- Vérifications Google (collez ici quand vous les aurez) -->
  <!-- <meta name="google-site-verification" content="COLLEZ_LE_CODE_ICI"> -->
  <!-- <meta name="google-adsense-account" content="ca-pub-XXXXXXXXXXXXXXXX"> -->

  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #ffffff;
      color: #111;
    }
    header {
      padding: 16px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 16px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    main { padding: 24px 16px; }
    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    button.primary {
      display: inline-block;
      margin: 8px 8px 0 0;
      padding: 12px 16px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #f3f3f3;
      cursor: pointer;
    }
    button.primary:active { transform: translateY(1px); }
    footer {
      padding: 24px 16px;
      border-top: 1px solid #eee;
      color: #444;
      background: #fafafa;
      text-align: center;
    }
    #ads-area { min-height: 90px; }
    select { padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <header>
    <div class="container row" style="justify-content: space-between; align-items: center;">
      <div>
        <h1>SOS.Monde</h1>
        <small>Propriété intellectuelle de <strong>BIBI ONDOUA</strong> —
          Contact : <a href="mailto:b.ondoua00@gmail.com">b.ondoua00@gmail.com</a></small>
      </div>
      <div>
        <label for="lang">Langue :</label>
        <select id="lang" aria-label="Choisir la langue">
          <option value="fr" selected>Français</option>
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="ja">日本語</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h2 id="t-title"></h2>
      <p id="t-desc" style="margin-top:-6px;"></p>

      <div class="row">
        <button class="primary" onclick="window.location.href='tel:112'">📞 Appeler les urgences (112)</button>
        <button class="primary" onclick="navigator.share ? navigator.share({title:'SOS.Monde', url:location.href}) : alert('Le partage n’est pas supporté par ce navigateur');">🔗 Partager</button>
      </div>

      <div id="ads-area" style="margin-top:20px;">
        <!-- Espace pub — AdSense ne se chargera que si l’utilisateur accepte le consentement ci-dessous -->
      </div>
    </div>
  </main>

  <footer>
    <small>&copy; <span id="year"></span> SOS.Monde — Tous droits réservés —
      <a href="privacy.html">Politique de confidentialité</a></small>
  </footer>

  <!-- i18n très simple -->
  <script>
    const i18n = {
      fr: { title: "Aide d’urgence, partout", desc: "Outils rapides pour contacter les secours et partager des infos vitales." },
      en: { title: "Emergency help, everywhere", desc: "Fast tools to contact emergency services and share vital info." },
      zh: { title: "全球紧急援助", desc: "快速联系急救服务，分享关键信息。" },
      ja: { title: "世界中で使える緊急支援", desc: "緊急連絡と重要情報の共有をすばやく。" }
    };
    function applyLang(l) {
      const t = i18n[l] || i18n.fr;
      document.getElementById('t-title').textContent = t.title;
      document.getElementById('t-desc').textContent  = t.desc;
      document.documentElement.lang = l;
      localStorage.setItem('lang', l);
    }
    const select = document.getElementById('lang');
    select.addEventListener('change', e => applyLang(e.target.value));
    applyLang(localStorage.getItem('lang') || 'fr');
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

  <!-- CMP minimal (consentement cookies) -->
  <div id="cmp" style="position:fixed;left:0;right:0;bottom:0;padding:12px;background:#f3f3f3;border-top:1px solid #ddd;display:none;">
    <strong>Cookies</strong> : accepter les cookies permet d’afficher des publicités pour financer le service.
    <button id="cmp-accept">Accepter</button>
    <button id="cmp-reject">Refuser</button>
    <a href="privacy.html">En savoir plus</a>
  </div>
  <script>
    const CMP_KEY = "sosmonde-consent";
    const consent = localStorage.getItem(CMP_KEY);
    const cmp = document.getElementById('cmp');
    if (consent === null) cmp.style.display = 'block';

    document.getElementById('cmp-accept').onclick = () => {
      localStorage.setItem(CMP_KEY, 'granted');
      cmp.style.display = 'none';
      loadAds();
    };
    document.getElementById('cmp-reject').onclick = () => {
      localStorage.setItem(CMP_KEY, 'denied');
      cmp.style.display = 'none';
    };

    // Charge AdSense UNIQUEMENT si consentement
    function loadAds() {
      if (localStorage.getItem(CMP_KEY) !== 'granted') return;
      const s = document.createElement('script');
      s.async = true;
      // Remplacez par votre ID AdSense : ca-pub-xxxxxxxxxxxxxxxx
      s.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX";
      s.crossOrigin = "anonymous";
      document.head.appendChild(s);

      const ins = document.createElement('ins');
      ins.className = "adsbygoogle";
      ins.style.display = "block";
      // Remplacez par vos identifiants réels
      ins.setAttribute("data-ad-client", "ca-pub-XXXXXXXXXXXXXXXX");
      ins.setAttribute("data-ad-slot", "0000000000");
      ins.setAttribute("data-ad-format", "auto");
      ins.setAttribute("data-full-width-responsive", "true");
      document.getElementById('ads-area').appendChild(ins);

      (window.adsbygoogle = window.adsbygoogle || []).push({});
    }
    loadAds();
  </script>

  <!-- Service Worker (PWA / mode hors-ligne) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
